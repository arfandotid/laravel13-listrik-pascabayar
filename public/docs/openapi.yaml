      tags:
        - Endpoints
      security: []
    post:
      summary: 'Memproses login admin.'
      operationId: memprosesLoginAdmin
      description: "Mendukung login menggunakan:\n- email\n- username"
      parameters: []
      responses: {  }
      tags:
        - Endpoints
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                login:
                  type: string
                  description: 'Email atau username.'
                  example: architecto
                password:
                  type: string
                  description: 'Password pengguna.'
                  example: '|]|{+-'
              required:
